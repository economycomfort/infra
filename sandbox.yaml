---
## Builds sandbox VM.

  - hosts: sandbox
    become: true
    pre_tasks:     
      - name: import keys from github
        ansible.posix.authorized_key:
          user: "{{ ansible_user }}"
          state: present
          key: https://github.com/economycomfort.keys

    roles:
      - role: grog.package
      - role: dab-motd
      - role: geerlingguy.docker
      - role: dab-dotfiles
      
